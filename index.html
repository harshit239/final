<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indo Thai Global</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  cursor: none;
  background: #8dd8ef;
}

#welcome {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}

#bg-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  display: none;
}

#cv {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 20;
}

#content {
  position: relative; z-index: 15;
  display: flex; flex-direction: column;
  align-items: center; text-align: center; gap: 14px;
  opacity: 0;
  margin-top: -12vh;
}
#content.visible {
  animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

.welcome-text {
  font-family: 'Jost', sans-serif;
  font-weight: 180;
  font-size: clamp(20px, 2.8vw, 30px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #1a3505;
  text-shadow: 0 1px 3px rgba(255,255,255,0.3);
  margin-bottom: 2px;
}

.eyebrow {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: clamp(14px, 1.8vw, 20px);
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: #1a3505;
  text-shadow: 0 1px 3px rgba(255,255,255,0.25);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(72px, 11vw, 148px);
  line-height: 1.05;
  color: #1a3505;
  text-shadow: 0 2px 8px rgba(255,255,255,0.4), 0 1px 0 rgba(255,255,255,0.2);
  letter-spacing: -0.01em;
}
h1 em { font-style: italic; color: #2a4a08; font-family: 'Playfair Display', serif; }

.divider {
  display: flex; align-items: center; gap: 14px;
  width: 340px;
}
.divider-line { flex: 1; height: 1px; background: rgba(20,50,5,0.45); }

.sub {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: clamp(18px, 2.2vw, 26px);
  letter-spacing: 0.05em;
  color: #1a3505;
  max-width: 420px;
  text-shadow: 0 1px 4px rgba(255,255,255,0.35);
}

.hint {
  margin-top: 18px;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: #1a3505;
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 0.8; }
}

#cur {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,220,60,0.85);
  mix-blend-mode: multiply;
  transform: translate(-50%,-50%);
  transition: width .12s, height .12s;
}
#cur-ring {
  position: fixed; pointer-events: none; z-index: 9998;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(200,160,20,0.40);
  transform: translate(-50%,-50%);
  transition: left .13s ease, top .13s ease;
}

#flash {
  position: fixed; inset: 0; z-index: 19999;
  pointer-events: none; opacity: 0;
}
#flash.go { animation: screenWipe 0.8s ease-in forwards; }
@keyframes screenWipe {
  0%   { opacity: 0; background: radial-gradient(circle at var(--cx) var(--cy), #fff8e0 0%, transparent 60%); }
  40%  { opacity: 1; background: radial-gradient(circle at var(--cx) var(--cy), #ffffff 0%, #d4f060 40%, #4a9e10 80%); }
  100% { opacity: 1; background: #0d2204; }
}

.bl {
  position: fixed; pointer-events: none; z-index: 19998;
  animation: blAnim var(--d) cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes blAnim {
  0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--r)) scale(1.4); opacity: 0; }
}

    <div class="welcome-text">Welcome to</div>
    <div class="eyebrow">Est. 2005 &nbsp;·&nbsp; Sustainable Drying Technology</div>
    <h1>Indo Thai<br>Global</h1>
    <div class="divider">
      <div class="divider-line"></div>
      <span style="font-size:16px">🌿</span>
      <div class="divider-line"></div>
    </div>
    <div class="sub">Harnessing the power of the sun to preserve nature's finest harvests</div>
    <div class="hint">Click anywhere to enter</div>
  </div>
</div>

<script>
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let W, H, sunX, sunY;

/* simple value noise */
function noise(x, y, s) {
  const n = Math.sin(x * 127.1 + y * 311.7 + (s||0) * 74.3) * 43758.5453;
  return n - Math.floor(n);
}

/* ── clouds ── */
const clouds = [];
function initClouds() {
  clouds.length = 0;
  const defs = [
    { xf:0.12, yf:0.08, w:320, h:95,  layers:6, speed:0.008 },
    { xf:0.68, yf:0.12, w:280, h:80,  layers:5, speed:0.010 },
    { xf:0.38, yf:0.22, w:240, h:70,  layers:5, speed:0.007 },
  ];
  defs.forEach(d => clouds.push({
    x: d.xf * W, y: d.yf * H,
    w: d.w, h: d.h, layers: d.layers,
    speed: d.speed, opacity: 0
  }));
}

function drawCloud(ctx, cx, cy, w, h, layers, alpha) {
  for (let l = 0; l < layers; l++) {
    const t  = l / (layers - 1);
    const lw = w * (0.5 + t * 0.5);
    const lh = h * (0.38 + t * 0.62);
    const ly = cy + (1 - t) * h * 0.20;
    const ba = alpha * (0.07 + t * 0.11);

    // core puff
    const g0 = ctx.createRadialGradient(cx, ly, 0, cx, ly, lw * 0.52);
    g0.addColorStop(0,   `rgba(255,255,255,${ba * 1.5})`);
    g0.addColorStop(0.45,`rgba(248,253,255,${ba})`);
    g0.addColorStop(1,   `rgba(220,238,255,0)`);
    ctx.beginPath(); ctx.ellipse(cx, ly, lw*0.52, lh*0.48, 0, 0, Math.PI*2);
    ctx.fillStyle = g0; ctx.fill();

    // left lobe
    const gl = ctx.createRadialGradient(cx-lw*0.27, ly+lh*0.07, 0, cx-lw*0.27, ly+lh*0.07, lw*0.30);
    gl.addColorStop(0, `rgba(255,255,255,${ba*1.3})`);
    gl.addColorStop(1, `rgba(230,245,255,0)`);
    ctx.beginPath(); ctx.ellipse(cx-lw*0.27, ly+lh*0.07, lw*0.30, lh*0.38, 0, 0, Math.PI*2);
    ctx.fillStyle = gl; ctx.fill();

    // right lobe
    const gr2 = ctx.createRadialGradient(cx+lw*0.24, ly+lh*0.05, 0, cx+lw*0.24, ly+lh*0.05, lw*0.28);
    gr2.addColorStop(0, `rgba(255,255,255,${ba*1.2})`);
    gr2.addColorStop(1, `rgba(230,245,255,0)`);
    ctx.beginPath(); ctx.ellipse(cx+lw*0.24, ly+lh*0.05, lw*0.28, lh*0.36, 0, 0, Math.PI*2);
    ctx.fillStyle = gr2; ctx.fill();

    // shadow belly
    const gs = ctx.createRadialGradient(cx, cy+h*0.32, 0, cx, cy+h*0.32, lw*0.46);
    gs.addColorStop(0,   `rgba(140,175,215,${ba*0.60})`);
    gs.addColorStop(0.6, `rgba(170,205,235,${ba*0.22})`);
    gs.addColorStop(1,   `rgba(200,225,245,0)`);
    ctx.beginPath(); ctx.ellipse(cx, cy+h*0.32, lw*0.46, lh*0.20, 0, 0, Math.PI*2);
    ctx.fillStyle = gs; ctx.fill();
  }
}

/* ── main draw ── */
function drawScene(elapsed) {
  bgCtx.clearRect(0, 0, W, H);
  sunX = W * 0.50;
  sunY = H * 0.12;
  const horizonY = H * 0.60;

  /* 1. SKY */
  const sky = bgCtx.createLinearGradient(0, 0, 0, horizonY);
  sky.addColorStop(0.00, '#eef8ff');
  sky.addColorStop(0.06, '#c5eaf8');
  sky.addColorStop(0.18, '#7ecce8');
  sky.addColorStop(0.42, '#52b4e8');
  sky.addColorStop(0.70, '#78cce6');
  sky.addColorStop(0.88, '#b5e8f5');
  sky.addColorStop(1.00, '#d5f0f8');
  bgCtx.fillStyle = sky;
  bgCtx.fillRect(0, 0, W, horizonY + 2);

  /* 2. Large atmospheric sun bloom */
  const bloom = bgCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, H * 0.55);
  bloom.addColorStop(0.00, 'rgba(255,255,245,0.72)');
  bloom.addColorStop(0.06, 'rgba(255,252,200,0.50)');
  bloom.addColorStop(0.18, 'rgba(255,238,140,0.24)');
  bloom.addColorStop(0.38, 'rgba(255,220,100,0.10)');
  bloom.addColorStop(0.65, 'rgba(200,232,255,0.04)');
  bloom.addColorStop(1.00, 'rgba(150,210,255,0)');
  bgCtx.fillStyle = bloom;
  bgCtx.fillRect(0, 0, W, H);

  /* 3. GOD RAYS */
  const rayCount = 16;
  const rayAngleOffset = elapsed * 0.000055;
  for (let i = 0; i < rayCount; i++) {
    const ang   = (i / rayCount) * Math.PI * 2 + rayAngleOffset;
    const len   = H * 1.5;
    const halfW = (0.016 + (i % 4) * 0.005);
    const pulse = 0.038 + Math.sin(elapsed * 0.0004 + i * 1.1) * 0.012;

    const ax1 = sunX + Math.cos(ang - halfW) * 50;
    const ay1 = sunY + Math.sin(ang - halfW) * 50;
    const ax2 = sunX + Math.cos(ang + halfW) * 50;
    const ay2 = sunY + Math.sin(ang + halfW) * 50;
    const ax3 = sunX + Math.cos(ang + halfW) * len;
    const ay3 = sunY + Math.sin(ang + halfW) * len;
    const ax4 = sunX + Math.cos(ang - halfW) * len;
    const ay4 = sunY + Math.sin(ang - halfW) * len;

    const rayG = bgCtx.createLinearGradient(
      sunX, sunY,
      sunX + Math.cos(ang)*len, sunY + Math.sin(ang)*len
    );
    rayG.addColorStop(0,   `rgba(255,252,215,${pulse})`);
    rayG.addColorStop(0.25,`rgba(255,245,195,${pulse*0.55})`);
    rayG.addColorStop(1,   `rgba(255,238,175,0)`);

    bgCtx.beginPath();
    bgCtx.moveTo(ax1,ay1); bgCtx.lineTo(ax2,ay2);
    bgCtx.lineTo(ax3,ay3); bgCtx.lineTo(ax4,ay4);
    bgCtx.closePath();
    bgCtx.fillStyle = rayG;
    bgCtx.fill();
  }

  /* 4. SUN */
  // outer halo ring
  const halo = bgCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 220);
  halo.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  halo.addColorStop(0.10, 'rgba(255,255,220,0.85)');
  halo.addColorStop(0.28, 'rgba(255,245,140,0.42)');
  halo.addColorStop(0.52, 'rgba(255,225,70,0.14)');
  halo.addColorStop(1.00, 'rgba(255,205,50,0)');
  bgCtx.beginPath(); bgCtx.arc(sunX, sunY, 220, 0, Math.PI*2);
  bgCtx.fillStyle = halo; bgCtx.fill();

  // sun disc
  const disc = bgCtx.createRadialGradient(sunX-16, sunY-16, 0, sunX, sunY, 75);
  disc.addColorStop(0.00, '#ffffff');
  disc.addColorStop(0.20, '#fffff5');
  disc.addColorStop(0.55, '#fff5a0');
  disc.addColorStop(1.00, '#fde030');
  bgCtx.beginPath(); bgCtx.arc(sunX, sunY, 75, 0, Math.PI*2);
  bgCtx.fillStyle = disc; bgCtx.fill();
  bgCtx.beginPath(); bgCtx.arc(sunX, sunY, 75, 0, Math.PI*2);
  bgCtx.strokeStyle = 'rgba(255,198,30,0.20)'; bgCtx.lineWidth = 8; bgCtx.stroke();

  /* 5. CLOUDS */
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.w * 0.7) c.x = -c.w * 0.7;
    c.opacity = Math.min(1, c.opacity + 0.004);
    drawCloud(bgCtx, c.x, c.y, c.w, c.h, c.layers, c.opacity);
  });

  /* 6. HORIZON HAZE */
  const haze = bgCtx.createLinearGradient(0, horizonY - H*0.10, 0, horizonY + H*0.07);
  haze.addColorStop(0,   'rgba(215,245,195,0)');
  haze.addColorStop(0.35,'rgba(235,252,210,0.60)');
  haze.addColorStop(0.65,'rgba(205,238,178,0.38)');
  haze.addColorStop(1,   'rgba(160,215,120,0)');
  bgCtx.fillStyle = haze;
  bgCtx.fillRect(0, horizonY - H*0.10, W, H*0.20);

  /* 7. FLAT GRASS PLAINS — smooth horizon, no jagged hills */
  // Layer 1: far distant plain (pale, hazy)
  const plain1Y = horizonY + H * 0.01;
  const p1G = bgCtx.createLinearGradient(0, plain1Y, 0, H);
  p1G.addColorStop(0,   '#b8e04a');
  p1G.addColorStop(0.2, '#98c830');
  p1G.addColorStop(1,   '#5a8c10');
  bgCtx.fillStyle = p1G;
  bgCtx.fillRect(0, plain1Y, W, H - plain1Y);

  // sunlight shimmer on far plain
  const sh1 = bgCtx.createRadialGradient(sunX, plain1Y, 0, sunX, plain1Y, W * 0.6);
  sh1.addColorStop(0,   'rgba(255,255,190,0.30)');
  sh1.addColorStop(0.45,'rgba(225,255,150,0.12)');
  sh1.addColorStop(1,   'rgba(200,240,100,0)');
  bgCtx.fillStyle = sh1;
  bgCtx.fillRect(0, plain1Y, W, H - plain1Y);

  // Layer 2: mid plain (richer green)
  const plain2Y = horizonY + H * 0.10;
  const p2G = bgCtx.createLinearGradient(0, plain2Y, 0, H);
  p2G.addColorStop(0,   '#7ec820');
  p2G.addColorStop(0.3, '#5ca010');
  p2G.addColorStop(1,   '#357008');
  bgCtx.fillStyle = p2G;
  bgCtx.fillRect(0, plain2Y, W, H - plain2Y);

  const sh2 = bgCtx.createRadialGradient(sunX, plain2Y, 0, sunX, plain2Y, W * 0.55);
  sh2.addColorStop(0,   'rgba(255,255,180,0.22)');
  sh2.addColorStop(0.4, 'rgba(220,255,140,0.08)');
  sh2.addColorStop(1,   'rgba(200,240,100,0)');
  bgCtx.fillStyle = sh2;
  bgCtx.fillRect(0, plain2Y, W, H - plain2Y);

  // Layer 3: near plain (dark rich foreground)
  const plain3Y = horizonY + H * 0.22;
  const p3G = bgCtx.createLinearGradient(0, plain3Y, 0, H);
  p3G.addColorStop(0,   '#58a010');
  p3G.addColorStop(0.25,'#3d7808');
  p3G.addColorStop(1,   '#1e4804');
  bgCtx.fillStyle = p3G;
  bgCtx.fillRect(0, plain3Y, W, H - plain3Y);

  /* 8. PLAIN GROUND fill — no blades */
  const fgBase = horizonY + H * 0.255;

  /* 9. GROUND fill */
  const gnd = bgCtx.createLinearGradient(0, fgBase, 0, H);
  gnd.addColorStop(0,   '#48900e');
  gnd.addColorStop(0.3, '#356808');
  gnd.addColorStop(1,   '#1c4204');
  bgCtx.fillStyle = gnd;
  bgCtx.fillRect(0, fgBase+5, W, H-fgBase);

  /* 10. FOREGROUND VIGNETTE */
  const vig = bgCtx.createLinearGradient(0, H*0.76, 0, H);
  vig.addColorStop(0, 'rgba(8,26,3,0)');
  vig.addColorStop(1, 'rgba(8,26,3,0.60)');
  bgCtx.fillStyle = vig;
  bgCtx.fillRect(0, H*0.76, W, H*0.24);

  /* 11. Vertical light shaft + lens flare */
  const shaft = bgCtx.createLinearGradient(sunX, sunY, sunX, H*0.65);
  shaft.addColorStop(0,   'rgba(255,255,200,0.13)');
  shaft.addColorStop(0.5, 'rgba(255,240,155,0.05)');
  shaft.addColorStop(1,   'rgba(255,230,110,0)');
  bgCtx.fillStyle = shaft;
  bgCtx.fillRect(sunX-90, sunY, 180, H*0.55);

  [
    { d:0.16, r:16, a:0.09, c:'255,242,140' },
    { d:0.28, r: 8, a:0.07, c:'195,215,255' },
    { d:0.42, r:22, a:0.05, c:'175,208,255' },
    { d:0.58, r: 6, a:0.09, c:'255,198,95'  },
  ].forEach(f => {
    const fx = W*.5 + (W*.5-sunX)*f.d*2;
    const fy = H*.5 + (H*.5-sunY)*f.d*2;
    const fg2 = bgCtx.createRadialGradient(fx,fy,0,fx,fy,f.r);
    fg2.addColorStop(0,`rgba(${f.c},${f.a})`);
    fg2.addColorStop(1,`rgba(${f.c},0)`);
    bgCtx.beginPath(); bgCtx.arc(fx,fy,f.r,0,Math.PI*2);
    bgCtx.fillStyle=fg2; bgCtx.fill();
  });
}

/* ── resize + init ── */
function resize() {
  W = bgCanvas.width  = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
  const lv = document.getElementById('cv');
  lv.width = W; lv.height = H;
  initClouds();
}
resize();
window.addEventListener('resize', resize, { passive: true });

/* ── animation loop ── */
let startTime = null;
let contentShown = false;

function tick(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  drawScene(elapsed);
  if (!contentShown && elapsed > 1600) {
    contentShown = true;
    document.getElementById('content').classList.add('visible');
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ── cursor ── */
const cur  = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
document.addEventListener('mousemove', e => {
  cur.style.left  = e.clientX+'px'; cur.style.top  = e.clientY+'px';
  ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px';
}, { passive: true });
document.addEventListener('mousedown', () => { cur.style.width='20px'; cur.style.height='20px'; });
document.addEventListener('mouseup',   () => { cur.style.width='12px'; cur.style.height='12px'; });

/* ── leaf particles ── */
const lv   = document.getElementById('cv');
const lctx = lv.getContext('2d');
const EM   = ['🍃','🌿','🍀','☘️'];
const pool = [];
let exiting = false;

function mkLeaf(x, y, burst) {
  const spd = burst ? 5.5 : 2;
  return { x, y,
    vx:(Math.random()-.5)*spd, vy:-(Math.random()*spd+1.2),
    g: burst?0.16:0.05, life:1, decay:burst?0.026:0.006,
    sz:Math.random()*12+7, rot:Math.random()*Math.PI*2,
    rv:(Math.random()-.5)*0.09, e:EM[Math.floor(Math.random()*EM.length)]
  };
}

let drizzleId = setInterval(() => {
  if (exiting) return;
  const l = mkLeaf(Math.random()*window.innerWidth, -10, false);
  l.vy=0.7; l.vx=(Math.random()-.5)*0.5; l.g=0.018; l.decay=0.003;
  pool.push(l);
}, 2000);

let lastT = 0;
document.addEventListener('mousemove', e => {
  if (exiting) return;
  const now = Date.now();
  if (now-lastT>220) { lastT=now; pool.push(mkLeaf(e.clientX,e.clientY,false)); }
}, { passive:true });
document.addEventListener('mousedown', e => {
  if (!exiting) for (let i=0;i<8;i++) pool.push(mkLeaf(e.clientX,e.clientY,true));
});

(function leafLoop() {
  lctx.clearRect(0, 0, lv.width, lv.height);
  if (pool.length>40) pool.splice(0, pool.length-40);
  for (let i=pool.length-1; i>=0; i--) {
    const l=pool[i];
    l.vy+=l.g; l.vx*=0.99; l.x+=l.vx; l.y+=l.vy; l.rot+=l.rv; l.life-=l.decay;
    if (l.life<=0) { pool.splice(i,1); continue; }
    lctx.globalAlpha=Math.max(0,l.life);
    lctx.font=l.sz+'px serif';
    lctx.save(); lctx.translate(l.x,l.y); lctx.rotate(l.rot);
    lctx.fillText(l.e,-l.sz/2,l.sz/2);
    lctx.restore();
  }
  lctx.globalAlpha=1;
  requestAnimationFrame(leafLoop);
})();

/* ── exit ── */
document.getElementById('welcome').addEventListener('click', e => {
  if (exiting) return;
  exiting = true;
  clearInterval(drizzleId);

  // quick emoji burst
  const es = ['☀️','🌿','🍃','🌾','✨','🌻','💛'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'bl';
    const ang = (i / 18) * Math.PI * 2 + Math.random() * 0.4;
    const d   = 100 + Math.random() * 260;
    el.textContent = es[Math.floor(Math.random() * es.length)];
    el.style.cssText =
      `left:${e.clientX}px;top:${e.clientY}px;font-size:${14+Math.random()*18}px;` +
      `--tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;` +
      `--r:${Math.random()*360-180}deg;--d:${0.4+Math.random()*0.3}s`;
    document.body.appendChild(el);
  }

  const flash = document.getElementById('flash');
  flash.style.setProperty('--cx', e.clientX + 'px');
  flash.style.setProperty('--cy', e.clientY + 'px');
  flash.classList.add('go');
  setTimeout(() => { window.location.href = 'home.html'; }, 820);
});
</script>
</body>
</html>
